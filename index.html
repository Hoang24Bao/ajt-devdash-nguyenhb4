<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevDash - Product Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
</head>

<body>

    <header>
        <nav class="navbar navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">DevDash</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section mb-4">
            <div class="container">
                <h1 class="display-5 fw-bold">DevDash <span>· Async Product Dashboard</span></h1>
                <p class="lead mb-0">Advanced asynchronous data loading system built with strict TypeScript.</p>
            </div>
        </section>

        <section class="container mb-5">
            <div class="row mb-4 p-4 bg-white rounded-4 shadow-sm align-items-center border">
                <div class="col-12">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">🔍</span>
                        <input type="text" id="search-input" class="form-control border-start-0 ps-0" placeholder="Search products by name..." />
                    </div>
                </div>
            </div>

            <div id="status-container" class="text-center my-4"></div>

            <div id="products-container" class="row g-4"></div>
        </section>

        <div id="detail-modal" class="custom-modal hidden">
            <div class="custom-modal-content">
                <span id="close-modal" class="custom-close-button">&times;</span>
                <div id="detail-container"></div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto border-top border-secondary">
        <div class="container text-center">
            <p class="mb-0 text-secondary">&copy; 2026 DevDash Project.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
